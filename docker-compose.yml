version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: historymap-postgres
    environment:
      POSTGRES_DB: historymap
      POSTGRES_USER: historymap
      POSTGRES_PASSWORD: historymap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historymap"]
      interval: 10s
      timeout: 5s
      retries: 5

  arangodb:
    image: arangodb:3.11
    container_name: historymap-arango
    environment:
      ARANGO_ROOT_PASSWORD: historymap
    volumes:
      - arango_data:/var/lib/arangodb3
    ports:
      - "8529:8529"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: historymap-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: historymap-backend
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/historymap
      POSTGRES_USER: historymap
      POSTGRES_PASSWORD: historymap
      ARANGO_HOST: arangodb
      ARANGO_PORT: 8529
      ARANGO_USER: root
      ARANGO_PASSWORD: historymap
      ARANGO_DATABASE: historymap
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: HistoryMapProductionSecretKeyThatIsLongEnoughFor256BitsHMACAlgorithm
      CORS_ORIGINS: http://localhost
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      arangodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: historymap-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  arango_data:
  redis_data:
